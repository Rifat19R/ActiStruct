name: actistruct
channels:
  - conda-forge
dependencies:
  - python=3.12
  - numpy=2.4.6
  - scipy=1.17.1
  - matplotlib=3.10.9
  - scikit-learn=1.9.0
  - ase=3.28.0
  - pillow=12.2.0
  - pip

# External runtime requirements used for the public benchmark reports:
# - Quantum ESPRESSO pw.x tested with QE 7.4.x-class installations.
# - SSSP 1.3.0 PBE efficiency pseudopotential family.
# - Linux/WSL environment with MPI available.
# Configure runtime paths in the shell, for example:
#   export ESPRESSO_PSEUDO=/path/to/SSSP_1.3.0_PBE_efficiency
#   export ESPRESSO_COMMAND="mpirun -np 2 pw.x"
